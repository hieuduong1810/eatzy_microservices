x-env-mapping: &env-mapping
  EUREKA_URL: http://eatzy-discovery-server:8761/eureka/
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eatzy-discovery-server:8761/eureka/
  DB_HOST: host.docker.internal
  DB_PORT: 3307
  REDIS_HOST: redis
  REDIS_PORT: 6379
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  SPRING_CONFIG_IMPORT: optional:configserver:http://eatzy-config-server:8888
  JWT_KEYSTORE_PATH: file:/app/eatzy.jks

services:
  # ==========================================
  # =============== INFRASTRUCTURE ===========
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: DOCKER://0.0.0.0:29092,HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: DOCKER://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: DOCKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # mariadb:
  #   image: mariadb:10.11
  #   container_name: mariadb
  #   restart: always
  #   environment:
  #     MARIADB_ROOT_PASSWORD: 123456
  #   ports:
  #     - "3307:3306"
  #   healthcheck:
  #     test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    env_file:
      - .env
    command: sh -c 'redis-server --requirepass "$${REDIS_PASSWORD:-}"'
    ports:
      - "6379:6379"

  # adminer:
  #   image: adminer:latest
  #   container_name: adminer
  #   restart: always
  #   ports:
  #     - "8089:8080"
  #   environment:
  #     ADMINER_DEFAULT_SERVER: mariadb
  #   depends_on:
  #     - mariadb

  # ==========================================
  # ============ CORE SERVICES ===============
  # ==========================================
  eatzy-discovery-server:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-discovery-server:latest
    build:
      context: .
      dockerfile: eatzy-discovery-server/Dockerfile
    container_name: eatzy-discovery-server
    restart: always
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  eatzy-config-server:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-config-server:latest
    build:
      context: .
      dockerfile: eatzy-config-server/Dockerfile
    container_name: eatzy-config-server
    restart: always
    ports:
      - "8888:8888"
    depends_on:
      - eatzy-discovery-server
    env_file:
      - .env
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eatzy-discovery-server:8761/eureka/

  # ==========================================
  # ============ BUSINESS SERVICES ===========
  # ==========================================
  eatzy-api-gateway:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-api-gateway:latest
    build:
      context: .
      dockerfile: eatzy-api-gateway/Dockerfile
    container_name: eatzy-api-gateway
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
    env_file:
      - .env
    environment:
      <<: *env-mapping

  eatzy-auth-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-auth-service:latest
    build:
      context: .
      dockerfile: eatzy-auth-service/Dockerfile
    container_name: eatzy-auth-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
      - redis
      - kafka
    env_file:
      - .env
    environment:
      <<: *env-mapping
    volumes:
      - ./eatzy-auth-service/src/main/resources/eatzy.jks:/app/eatzy.jks:ro

  eatzy-restaurant-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-restaurant-service:latest
    build:
      context: .
      dockerfile: eatzy-restaurant-service/Dockerfile
    container_name: eatzy-restaurant-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
      - kafka
    env_file:
      - .env
    environment:
      <<: *env-mapping

  eatzy-order-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-order-service:latest
    build:
      context: .
      dockerfile: eatzy-order-service/Dockerfile
    container_name: eatzy-order-service
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
      - redis
      - kafka
    env_file:
      - .env
    environment:
      <<: *env-mapping

  eatzy-communication-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-communication-service:latest
    build:
      context: .
      dockerfile: eatzy-communication-service/Dockerfile
    container_name: eatzy-communication-service
    restart: always
    ports:
      - "8084:8084"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
      - redis
      - kafka
    env_file:
      - .env
    environment:
      <<: *env-mapping

  eatzy-cart-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-cart-service:latest
    build:
      context: .
      dockerfile: eatzy-cart-service/Dockerfile
    container_name: eatzy-cart-service
    restart: always
    ports:
      - "8085:8085"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
    env_file:
      - .env
    environment:
      <<: *env-mapping

  eatzy-payment-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-payment-service:latest
    build:
      context: .
      dockerfile: eatzy-payment-service/Dockerfile
    container_name: eatzy-payment-service
    restart: always
    ports:
      - "8086:8086"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
    env_file:
      - .env
    environment:
      <<: *env-mapping

  eatzy-interaction-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-interaction-service:latest
    build:
      context: .
      dockerfile: eatzy-interaction-service/Dockerfile
    container_name: eatzy-interaction-service
    restart: always
    ports:
      - "8087:8087"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
      - kafka
    env_file:
      - .env
    environment:
      <<: *env-mapping

  eatzy-system-config-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-system-config-service:latest
    build:
      context: .
      dockerfile: eatzy-system-config-service/Dockerfile
    container_name: eatzy-system-config-service
    restart: always
    ports:
      - "8088:8088"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
    env_file:
      - .env
    environment:
      <<: *env-mapping

  eatzy-ai-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-ai-service:latest
    build:
      context: .
      dockerfile: eatzy-ai-service/Dockerfile
    container_name: eatzy-ai-service
    restart: always
    ports:
      - "8089:8089"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
    env_file:
      - .env
    environment:
      <<: *env-mapping
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      EUREKA_SERVER_URL: http://eatzy-discovery-server:8761/eureka
      SERVICE_PORT: 8089
      INSTANCE_HOST: eatzy-ai-service
      API_GATEWAY_URL: http://eatzy-api-gateway:8080

  # ==========================================
  # =========== LOGGING & TRACING ============
  # ==========================================
#   elasticsearch:
#     image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
#     container_name: elasticsearch
#     environment:
#       - discovery.type=single-node
#       - ES_JAVA_OPTS=-Xms512m -Xmx512m
#       - xpack.security.enabled=false
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.3
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_started
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.3
    container_name: logstash
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5000:5000"
      - "9600:9600"
    depends_on:
      elasticsearch:
        condition: service_started

  zipkin:
    container_name: zipkin
    image: openzipkin/zipkin
    volumes:
      - zipkin-data:/zipkin-data
    ports:
      - "9411:9411"

  # ==========================================
  # =============== MONITORING ===============
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      # Cấu hình chính
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Các rule alert
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
    command:
      - "--config.file=/etc/alertmanager/config.yml"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      # thay đổi nếu cần, ví dụ mật khẩu admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # Lưu trữ dữ liệu Grafana (dashboard, user, setting…)
      - grafana-storage:/var/lib/grafana
      # Cấu hình provisioning: datasource + dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  grafana-storage:
  elasticsearch-data:
  zipkin-data: