version: '3.8'

x-env-mapping: &env-mapping
  EUREKA_URL: http://eatzy-discovery-server:8761/eureka/
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eatzy-discovery-server:8761/eureka/
  DB_HOST: mariadb
  DB_PORT: 3306
  REDIS_HOST: redis
  REDIS_PORT: 6379
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  SPRING_CONFIG_IMPORT: optional:configserver:http://eatzy-config-server:8888

services:
  # ==========================================
  # =============== INFRASTRUCTURE ===========
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: DOCKER://0.0.0.0:29092,HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: DOCKER://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: DOCKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: 123456
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    env_file:
      - .env
    command: sh -c 'redis-server --requirepass "$${REDIS_PASSWORD:-}"'
    ports:
      - "6379:6379"

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: always
    ports:
      - "8089:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mariadb
    depends_on:
      - mariadb

  # ==========================================
  # ============ CORE SERVICES ===============
  # ==========================================
  eatzy-discovery-server:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-discovery-server:latest
    build:
      context: .
      dockerfile: eatzy-discovery-server/Dockerfile
    container_name: eatzy-discovery-server
    restart: always
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  eatzy-config-server:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-config-server:latest
    build:
      context: .
      dockerfile: eatzy-config-server/Dockerfile
    container_name: eatzy-config-server
    restart: always
    ports:
      - "8888:8888"
    depends_on:
      - eatzy-discovery-server
    env_file:
      - .env
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eatzy-discovery-server:8761/eureka/

  # ==========================================
  # ============ BUSINESS SERVICES ===========
  # ==========================================
  eatzy-api-gateway:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-api-gateway:latest
    build:
      context: .
      dockerfile: eatzy-api-gateway/Dockerfile
    container_name: eatzy-api-gateway
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
    env_file:
      - .env
    environment:
      <<: *env-mapping

  eatzy-auth-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-auth-service:latest
    build:
      context: .
      dockerfile: eatzy-auth-service/Dockerfile
    container_name: eatzy-auth-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
      - mariadb
      - redis
      - kafka
    env_file:
      - .env
    environment:
      <<: *env-mapping

  eatzy-restaurant-service:
    image: ${DOCKERHUB_USER:-hieuduong1810}/eatzy-restaurant-service:latest
    build:
      context: .
      dockerfile: eatzy-restaurant-service/Dockerfile
    container_name: eatzy-restaurant-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - eatzy-discovery-server
      - eatzy-config-server
      - mariadb
      - kafka
    env_file:
      - .env
    environment:
