name: CI/CD Eatzy Microservices

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker images
        run: |
          SERVICES=(
            "eatzy-discovery-server"
            "eatzy-config-server"
            "eatzy-api-gateway"
            "eatzy-auth-service"
            "eatzy-restaurant-service"
            "eatzy-order-service"
            "eatzy-communication-service"
            "eatzy-cart-service"
            "eatzy-payment-service"
            "eatzy-interaction-service"
            "eatzy-system-config-service"
          )

          for SERVICE in "${SERVICES[@]}"; do
            echo "========================================="
            echo "Building $SERVICE..."
            echo "========================================="
            docker build -t ${{ secrets.DOCKERHUB_USER }}/$SERVICE:latest -f $SERVICE/Dockerfile .
            
            echo "========================================="
            echo "Pushing $SERVICE..."
            echo "========================================="
            docker push ${{ secrets.DOCKERHUB_USER }}/$SERVICE:latest
          done

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            # cd vào thư mục project trên server (hãy đảm bảo đường dẫn này đúng trên server của bạn)
            cd /home/hieu/projects/eatzy-microservices
            
            # Export biến môi trường để docker-compose biết pull image từ đâu
            export DOCKERHUB_USER=${{ secrets.DOCKERHUB_USER }}
            
            # Pull các image mới nhất
            docker compose pull
            
            # Khởi động lại các container
            docker compose up -d
            
            # Xóa các image cũ để giải phóng dung lượng
            docker image prune -f
