server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Database (MariaDB)
spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3307}/eatzy_order_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # Redis
  data:
    web:
      pageable:
        one-indexed-parameters: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.eatzy.common.event"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    oauth2:
      resourceserver:
        jwt: {}

# JWT
app:
  jwks:
    uri: http://eatzy-auth-service:8081/.well-known/jwks.json
  services:
    auth-service-url: http://eatzy-auth-service
    restaurant-service-url: http://eatzy-restaurant-service
  delivery:
    base-fee: 15000
    base-distance: 3
    per-km-fee: 5000
    min-fee: 10000
  commission:
    restaurant-rate: 0.20
    driver-rate: 0.15
  cleanup:
    vnpay-expiry-minutes: 15
    restaurant-timeout-minutes: 15
    driver-timeout-minutes: 30
    driver-accept-timeout-seconds: 30
